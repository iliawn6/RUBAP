# Apache Airflow ETL Orchestrator
# Uses LocalExecutor with PostgreSQL. Joins kafka-network to reach MinIO (Data Lake).
# Prerequisite: Start kafka-compose first so kafka-network exists.
#
# Usage:
#   docker compose -f Compose-file/kafka-compose.yml up -d
#   docker compose -f airflow_components/airflow-compose.yml up -d

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.11.1
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  env_file:
    - .env
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-amazon
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW_CONN_MINIO_S3: ${AIRFLOW_CONN_MINIO_S3}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  networks:
    - airflow-internal
    - compose-file_kafka-network

networks:
  airflow-internal:
    driver: bridge
  compose-file_kafka-network:
    external: true

volumes:
  postgres-db-volume:

services:
  postgres:
    image: postgres:16-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - airflow-internal

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
       bash -c 'airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true'
    networks:
      - airflow-internal

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
