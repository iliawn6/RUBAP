version: '3.8'

networks:
  kafka-network:
    driver: bridge

volumes:
  kafka-data:
  minio-data:
  mongo-data:

services:
  kafka:
    image: apache/kafka:4.2.0-rc2
    container_name: kafka-broker
    networks:
      - kafka-network
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:19092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  kafka-init:
    image: apache/kafka:4.2.0-rc2
    container_name: kafka-init
    networks:
      - kafka-network
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic user-events --partitions 3 --replication-factor 1 && echo 'Topic user-events ready.'"
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - kafka-network
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    # image: minio/minio:latest
    container_name: minio-init
    networks:
      - kafka-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/user-events-lake && echo 'Bucket user-events-lake ready.'"
    restart: "no"

  mongo:
    image: mongo:8
    container_name: mongo
    networks:
      - kafka-network
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-init:
    image: mongo:8
    container_name: mongo-init
    networks:
      - kafka-network
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: ["mongosh", "--host", "mongo", "--eval"]
    command:
      - "db.getSiblingDB('hot_storage').user_events.createIndex({'_ingested_at': 1}, {expireAfterSeconds: 3600}); print('TTL index ready.')"
    restart: "no"

  api:
    build:
      context: ../
      dockerfile: Dockerfile.api
    container_name: rubap-api
    networks:
      - kafka-network
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: hot_storage
      MONGO_COLLECTION: user_events
      CLICKHOUSE_HOST: host.docker.internal
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DATABASE: default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
